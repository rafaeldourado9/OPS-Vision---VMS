###############################################
# MediaMTX configuration file
# Câmeras são adicionadas DINAMICAMENTE via API
# pelo Streaming Service quando criadas no frontend
###############################################

###############################################
# Global settings

logLevel: info
logDestinations: [stdout]
logFile: mediamtx.log
sysLogPrefix: mediamtx

readTimeout: 120s
writeTimeout: 120s
writeQueueSize: 524288
udpMaxPayloadSize: 1472

runOnConnect:
runOnConnectRestart: no
runOnDisconnect:

###############################################
# Authentication

authMethod: internal

authInternalUsers:
  # Qualquer IP pode ler streams (HLS/WebRTC/RTSP) e publicar (câmeras IP)
  - user: any
    pass:
    ips: []
    permissions:
      - action: read
      - action: publish
      - action: playback

  # API de controle e métricas (qualquer IP na rede Docker)
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: metrics
      - action: pprof

###############################################
# Control API

api: yes
apiAddress: :9997
apiEncryption: no
apiServerKey: server.key
apiServerCert: server.crt
apiAllowOrigins: ['*']
apiTrustedProxies: []

###############################################
# Metrics

metrics: yes
metricsAddress: :9998
metricsEncryption: no
metricsServerKey: server.key
metricsServerCert: server.crt
metricsAllowOrigins: ['*']
metricsTrustedProxies: []

###############################################
# PPROF

pprof: no
pprofAddress: :9999
pprofEncryption: no
pprofServerKey: server.key
pprofServerCert: server.crt
pprofAllowOrigins: ['*']
pprofTrustedProxies: []

###############################################
# Playback server - DESABILITADO (Backend faz playback)

playback: no
playbackAddress: :9996
playbackEncryption: no
playbackServerKey: server.key
playbackServerCert: server.crt
playbackAllowOrigins: ['*']
playbackTrustedProxies: []

###############################################
# RTSP server

rtsp: yes
rtspTransports: [tcp, udp]
rtspEncryption: "no"
rtspAddress: :8554
rtspsAddress: :8322
rtpAddress: :8000
rtcpAddress: :8001
multicastIPRange: 224.1.0.0/16
multicastRTPPort: 8002
multicastRTCPPort: 8003
srtpAddress: :8004
srtcpAddress: :8005
multicastSRTPPort: 8006
multicastSRTCPPort: 8007
rtspServerKey: server.key
rtspServerCert: server.crt
rtspAuthMethods: [basic]
rtspUDPReadBufferSize: 0

###############################################
# RTMP server

rtmp: yes
rtmpAddress: :1935
rtmpEncryption: "no"
rtmpsAddress: :1936
rtmpServerKey: server.key
rtmpServerCert: server.crt

###############################################
# HLS server - OTIMIZADO PARA 12 CÂMERAS

hls: yes
hlsAddress: :8888
hlsEncryption: no
hlsServerKey: server.key
hlsServerCert: server.crt
hlsAllowOrigins: ['*']
hlsTrustedProxies: [172.18.0.0/16]
hlsAlwaysRemux: no
hlsVariant: fmp4
hlsSegmentCount: 3
hlsSegmentDuration: 2s
hlsSegmentMaxSize: 10M
hlsDirectory: ''
hlsMuxerCloseAfter: 60s
hlsPartDuration: 200ms
# Propaga query string (?token=xxx) para URLs de segmentos no playlist gerado.

###############################################
# WebRTC server

webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcServerKey: server.key
webrtcServerCert: server.crt
webrtcAllowOrigins: ['*']
webrtcTrustedProxies: []
webrtcLocalUDPAddress: :8189
webrtcIPsFromInterfaces: yes
webrtcIPsFromInterfacesList: []
webrtcAdditionalHosts: ["127.0.0.1", "localhost"]
webrtcICEServers2: []
webrtcHandshakeTimeout: 10s
webrtcTrackGatherTimeout: 2s
webrtcSTUNGatherTimeout: 5s

###############################################
# SRT server

srt: yes
srtAddress: :8890

###############################################
# Default path settings

pathDefaults:
  source: publisher
  sourceFingerprint:
  sourceOnDemand: no
  maxReaders: 100
  srtReadPassphrase:
  fallback:
  useAbsoluteTimestamp: no

  # Gravação habilitada - segmentação em MP4 (60s) para a Linha do Tempo
  record: yes
  recordPath: /recordings/%path/%Y/%m/%d/%H-%M-%S.mp4
  recordFormat: fmp4
  recordPartDuration: 10s
  recordSegmentDuration: 60s
  recordDeleteAfter: 7d

  # Hooks de status do stream
  runOnReady: >-
    curl -s -X POST http://fastapi:8001/webhooks/mediamtx/on_ready -H "Content-Type: application/json" -d '{"path":"$MTX_PATH", "source_type":"$MTX_SOURCE_TYPE", "source_id":"$MTX_SOURCE_ID"}'
  runOnReadyRestart: no
  runOnNotReady: >-
    curl -s -X POST http://fastapi:8001/webhooks/mediamtx/on_not_ready -H "Content-Type: application/json" -d '{"path":"$MTX_PATH", "source_type":"$MTX_SOURCE_TYPE", "source_id":"$MTX_SOURCE_ID"}'
  runOnRead: >-
    curl -s -X POST http://fastapi:8001/webhooks/mediamtx/on_read -H "Content-Type: application/json" -d '{"path":"$MTX_PATH", "reader_type":"$MTX_READER_TYPE", "reader_id":"$MTX_READER_ID"}'
  runOnReadRestart: no
  runOnUnread: >-
    curl -s -X POST http://fastapi:8001/webhooks/mediamtx/on_unread -H "Content-Type: application/json" -d '{"path":"$MTX_PATH", "reader_type":"$MTX_READER_TYPE", "reader_id":"$MTX_READER_ID"}'

  # Hook disparado sempre que um segmento de gravação é completado
  runOnRecordSegmentComplete: >-
    curl -s -X POST http://fastapi:8001/webhooks/mediamtx/record_segment -H "Content-Type: application/json" -d '{"path":"$MTX_PATH", "file_path":"$MTX_SEGMENT_PATH"}'
  rtspUDPReadBufferSize: 0

  mpegtsUDPReadBufferSize: 0
  rtpSDP:
  rtpUDPReadBufferSize: 0
  sourceRedirect:

  rpiCameraCamID: 0
  rpiCameraSecondary: false
  rpiCameraWidth: 1920
  rpiCameraHeight: 1080
  rpiCameraHFlip: false
  rpiCameraVFlip: false
  rpiCameraBrightness: 0
  rpiCameraContrast: 1
  rpiCameraSaturation: 1
  rpiCameraSharpness: 1
  rpiCameraExposure: normal
  rpiCameraAWB: auto
  rpiCameraAWBGains: [0, 0]
  rpiCameraDenoise: "off"
  rpiCameraShutter: 0
  rpiCameraMetering: centre
  rpiCameraGain: 0
  rpiCameraEV: 0
  rpiCameraLensPosition: 0.0
  rpiCameraAfWindow:
  rpiCameraFlickerPeriod: 0
  rpiCameraTextOverlayEnable: false
  rpiCameraTextOverlay: '%Y-%m-%d %H:%M:%S - MediaMTX'
  rpiCameraCodec: auto
  rpiCameraIDRPeriod: 60
  rpiCameraBitrate: 5000000
  rpiCameraHardwareH264Profile: main
  rpiCameraHardwareH264Level: '4.1'
  rpiCameraSoftwareH264Profile: baseline
  rpiCameraSoftwareH264Level: '4.1'
  rpiCameraMJPEGQuality: 60

###############################################
# Paths
###############################################

paths:
  # Câmeras serão provisionadas dinamicamente via API
  # Quando uma câmera não consegue conectar na fonte,

  # o HLS retorna 404 até que a fonte esteja disponível
