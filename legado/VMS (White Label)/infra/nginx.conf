events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        client_max_body_size 100M;

        location /api/ {
            set $upstream_django django:8000;
            proxy_pass http://$upstream_django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
            set $upstream_django django:8000;
            proxy_pass http://$upstream_django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location /master/ {
            set $upstream_django django:8000;
            proxy_pass http://$upstream_django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /stream/ {
            resolver 127.0.0.11 valid=10s;
            set $upstream_mediamtx mediamtx:8888;
            rewrite ^/stream/(.*)$ /$1 break;
            proxy_pass http://$upstream_mediamtx;
            proxy_set_header Host $host;
        }

        # HLS streams do MediaMTX
        location /hls/ {
            resolver 127.0.0.11 valid=10s;
            set $upstream_mediamtx mediamtx:8888;
            rewrite ^/hls/(.*)$ /$1 break;
            proxy_pass http://$upstream_mediamtx;
            proxy_set_header Host $host;
            proxy_buffering off;
            add_header Cache-Control "no-cache";
        }

        # WebRTC WHEP/WHIP do MediaMTX
        location /webrtc/ {
            resolver 127.0.0.11 valid=10s;
            set $upstream_mediamtx mediamtx:8889;
            rewrite ^/webrtc/(.*)$ /$1 break;
            proxy_pass http://$upstream_mediamtx;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        location /media/ {
            # Serve snapshots/thumbnails de IA diretamente do volume compartilhado
            # O volume 'storage' é montado em /app/storage no Django e nos workers
            alias /app/storage/;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
            add_header Access-Control-Allow-Origin *;
            try_files $uri $uri/ =404;
        }

        location /static/ {
            alias /usr/share/nginx/html/static/;
        }

        location / {
            set $upstream_frontend frontend:80;
            proxy_pass http://$upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
