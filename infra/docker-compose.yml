version: '3.8'

services:
  django:
    build: ../backend-django
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py sync_mediamtx &
             daphne -b 0.0.0.0 -p 8000 gtvision.asgi:application"
    volumes:
      - ../backend-django:/app
      - django-static:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - ../backend-django/.env
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - gtvision

  ai-worker:
    build:
      context: ../backend-fastapi/workers/ai_worker
      dockerfile: Dockerfile.ai
    volumes:
      - ../models:/app/models:ro
      - ../storage:/app/storage
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
      - MODEL_PLATE_DETECTOR=/app/models/plate_detector.pt
      - MODEL_CHAR_RECOGNIZER=/app/models/char_recognizer.pt
      - STORAGE_PATH=/app/storage
      - DJANGO_INTERNAL_URL=http://django:8000
    depends_on:
      - rabbitmq
      - redis
    networks:
      - gtvision

  recorder-worker:
    build:
      context: ../backend-fastapi/workers/recorder
      dockerfile: Dockerfile.worker
    volumes:
      - ../storage:/app/storage
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - MEDIAMTX_URL=http://mediamtx:8888
      - DJANGO_INTERNAL_URL=http://django:8000
    depends_on:
      - rabbitmq
      - redis
      - mediamtx
    networks:
      - gtvision

  frame-grabber:
    build:
      context: ../backend-fastapi/workers/frame_grabber
      dockerfile: Dockerfile.worker
    volumes:
      - ../storage:/app/storage
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - MEDIAMTX_URL=http://mediamtx:8888
    depends_on:
      - rabbitmq
      - redis
      - mediamtx
    networks:
      - gtvision

  clip-builder:
    build:
      context: ../backend-fastapi/workers/clip_builder
      dockerfile: Dockerfile.worker
    volumes:
      - ../storage:/app/storage
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - DJANGO_INTERNAL_URL=http://django:8000
    depends_on:
      - rabbitmq
      - redis
    networks:
      - gtvision

  purge-worker:
    build:
      context: ../backend-fastapi/workers/purge
      dockerfile: Dockerfile.worker
    volumes:
      - ../storage:/app/storage
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_PATH=/app/storage
      - DJANGO_INTERNAL_URL=http://django:8000
    depends_on:
      - redis
    networks:
      - gtvision

  mediamtx:
    image: bluenviron/mediamtx:latest
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8889:8889"   # WebRTC
      - "8888:8888"   # HLS
      - "9996:9996"   # Playback
      - "9997:9997"   # MediaMTX API
    networks:
      - gtvision

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=gtvision
      - POSTGRES_USER=gtvision
      - POSTGRES_PASSWORD=gtvision123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - gtvision

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - gtvision

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - gtvision

  mediamtx-sync:
    build: ../backend-django
    command: sh -c "sleep 15 && python manage.py start_recordings && python manage.py sync_mediamtx --watch"
    volumes:
      - ../backend-django:/app
    env_file:
      - ../backend-django/.env
    depends_on:
      - django
      - mediamtx
    networks:
      - gtvision

  frontend:
    build: ../frontend
    networks:
      - gtvision

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - django-static:/usr/share/nginx/html/static
    ports:
      - "80:80"
    depends_on:
      - django
      - frontend
      - mediamtx
    networks:
      - gtvision

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  django-static:

networks:
  gtvision:
    driver: bridge
