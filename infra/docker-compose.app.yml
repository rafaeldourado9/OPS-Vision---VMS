services:
  django:
    build: ../backend-django
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py sync_mediamtx &
             python manage.py consume_ai_events &
             daphne -b 0.0.0.0 -p 8000 gtvision.asgi:application"
    volumes:
      - ../backend-django:/app
      - ../storage:/app/storage
      - django-static:/app/staticfiles
    env_file:
      - ../backend-django/.env
    networks:
      - gtvision

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    volumes:
      - django-static:/usr/share/nginx/html/django-static:ro
    depends_on:
      - django
    networks:
      - gtvision

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../storage:/app/storage:ro
    depends_on:
      - django
      - frontend
    networks:
      - gtvision

  mediamtx-sync:
    build: ../backend-django
    command: sh -c "sleep 15 && python manage.py start_recordings && python manage.py sync_mediamtx --watch"
    volumes:
      - ../backend-django:/app
      - ../storage:/app/storage
    env_file:
      - ../backend-django/.env
    depends_on:
      - django
    networks:
      - gtvision

volumes:
  django-static:

networks:
  gtvision:
    name: gtvision
    external: true
