groups:
  - name: vms_pipeline
    rules:
      - alert: WorkerDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Worker {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been unreachable for 2 minutes."

      - alert: LPRLatencyHigh
        expr: histogram_quantile(0.99, rate(lpr_processing_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "LPR p99 latency above 2s"
          description: "LPR processing p99 latency is {{ $value }}s"

      - alert: QueueDepthHigh
        expr: rabbitmq_queue_messages > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue {{ $labels.queue }} depth > 1000"

      - alert: FrameGrabberLowFPS
        expr: rate(fg_frames_captured_total[5m]) < 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frame grabber FPS below 0.5"

      - alert: OCRSuccessRateLow
        expr: rate(lpr_ocr_success_total[10m]) / rate(lpr_plates_processed_total[10m]) < 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LPR OCR success rate below 80%"

      - alert: GPUMemoryHigh
        expr: gpu_memory_used_bytes / gpu_memory_total_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU memory usage above 90%"

      - alert: EventConsumerLag
        expr: rate(events_consumed_total[5m]) == 0 and rabbitmq_queue_messages{queue="ai.events"} > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Event consumer is lagging"
