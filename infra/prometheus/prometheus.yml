global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'django'
    metrics_path: /metrics
    static_configs:
      - targets: ['django:8000']

  - job_name: 'frame-grabber'
    metrics_path: /metrics
    static_configs:
      - targets: ['frame-grabber:9100']

  - job_name: 'yolo-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['yolo-worker:9100']

  - job_name: 'lpr-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['lpr-worker:9100']

  - job_name: 'facial-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['facial-worker:9100']

  - job_name: 'recorder-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['recorder-worker:9100']

  - job_name: 'purge-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['purge-worker:9100']

  # Analytic workers (all share the same image, different ports)
  - job_name: 'analytic-workers'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'worker-crowd:9100'
          - 'worker-intrusion:9100'
          - 'worker-object-detection:9100'
          - 'worker-loitering:9100'
          - 'worker-abandoned-object:9100'
          - 'worker-queue:9100'
          - 'worker-heatmap:9100'
          - 'worker-line-crossing:9100'
          - 'worker-human-traffic:9100'
          - 'worker-vehicle-traffic:9100'

  # RabbitMQ (built-in prometheus plugin)
  - job_name: 'rabbitmq'
    metrics_path: /metrics
    static_configs:
      - targets: ['rabbitmq:15692']

  # Redis exporter would need a separate container, skip for now
  # PostgreSQL exporter would need a separate container, skip for now
