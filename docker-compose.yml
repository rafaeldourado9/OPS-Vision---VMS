services:
  # ── Core ─────────────────────────────────────
  django:
    build: ./core
    command: gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:8000 --timeout 120 --access-logfile -
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./core:/app
      - recordings:/recordings
    environment:
      - DJANGO_DEBUG=true
      - DJANGO_SETTINGS_MODULE=config.settings.dev

  fastapi:
    build: ./async_services
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    env_file: .env
    environment:
      - DJANGO_INTERNAL_URL=http://django:8000
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - ./async_services:/app
      - recordings:/recordings

  worker:
    build: ./core
    command: celery -A config.celery worker -l info -Q default,recordings,analytics -P solo
    env_file: .env
    depends_on:
      - django
      - rabbitmq
    volumes:
      - ./core:/app
      - recordings:/recordings

  beat:
    build: ./core
    command: celery -A config.celery beat -l debug -s /var/celerybeat/celerybeat-schedule
    env_file: .env
    depends_on:
      - worker
      - rabbitmq
    volumes:
      - ./core:/app
      - celerybeat:/var/celerybeat

  # ── Frontend ───────────────────────────────────
  frontend:
    build: ./frontend
    depends_on:
      - django
      - fastapi
    restart: unless-stopped

  # ── Reverse Proxy ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - recordings:/var/recordings:ro
    depends_on:
      - django
      - fastapi
      - frontend
    restart: unless-stopped

  # ── Streaming ────────────────────────────────
  mediamtx:
    build: ./mediamtx
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
      - "9997:9997"   # API
      - "9998:9998"   # Metrics (Prometheus)
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
      - recordings:/recordings
    depends_on:
      - fastapi
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9997/v3/paths/list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Analytics Service ───────────────────────
  analytics_service:
    build: ./analytics_service
    env_file: .env
    environment:
      MEDIAMTX_URL: http://mediamtx:9997
      MEDIAMTX_RTSP_BASE_URL: rtsp://mediamtx:8554
      DJANGO_INTERNAL_URL: http://django:8000
      REDIS_URL: redis://redis:6379/0
      FPS: "10"
      WORKERS_PER_PLUGIN: "8"
      OPENCV_LOG_LEVEL: "0"
      AV_LOG_FORCE_NOCOLOR: "1"
      FRAME_EXECUTOR_WORKERS: "32"
      MAX_QUEUE_DEPTH: "150"
      YOLO_IMGSZ: "640"
      YOLO_CONF: "0.30"
      SNAPSHOTS_PATH: /recordings/snapshots
      PLATE_DETECTOR_MODEL: /models/plate_detector.pt
    depends_on:
      mediamtx:
        condition: service_healthy
      django:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./analytics_service/analytics:/app/analytics
      - recordings:/recordings
      - ./models:/models:ro
    restart: unless-stopped

  # ── Infraestrutura ──────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vms}
      POSTGRES_USER: ${POSTGRES_USER:-vms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vmsdev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vms"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15900:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-vms}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-vmsdev}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  recordings:
  celerybeat:
